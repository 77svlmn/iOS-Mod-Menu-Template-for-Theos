name: Auto NIC packager

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  packager:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true

      - name: Setup Theos
        uses: pypush/actions-setup-theos@v1

      - name: Build Tweak
        run: |
          make package FINALPACKAGE=1 ALWAYS_INSTALL=0 || true
          
      - name: Find and Upload Dylib
        uses: actions/upload-artifact@v3
        with:
          name: iOS-Mod-Menu-File
          path: .theos/obj/debug/*.dylib
